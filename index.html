<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>screensavers</title>
  <style>
    html, body { margin: 0; background: #111; color: #ddd;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    body { max-width: 36rem; padding: 3rem 1.5rem; margin: 0 auto;
      font-size: 14px; line-height: 1.6; }
    h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.04em;
      margin: 0 0 1.4rem; color: #fff; }
    a { color: #9cf; text-decoration: none; }
    a:hover { color: #fff; }
    p { margin: 0.5rem 0; }
    ul { list-style: none; padding: 0; }
    li { padding: 0.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06); }
    .muted { color: #777; font-size: 12px; }
    .attribution { color: #555; font-size: 11px; padding-left: 1rem;
      padding-top: 0.2rem; }
    .attribution a { color: #779; }
    .attribution a:hover { color: #9cf; }
    code { background: rgba(255,255,255,0.05); padding: 0.1rem 0.35rem;
      border-radius: 2px; color: #9cf; font-size: 12.5px; }

</head>
<body>

  <ul>
    <li>
      <a href="petri-dish/">petri-dish</a>

      <div class="attribution">
