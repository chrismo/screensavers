<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Petri Dish — p5</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.1/lib/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #111; }
    canvas { display: block; }

    #drawer {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 280px;
      background: rgba(10, 12, 18, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #ddd;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      transform: translateX(-280px);
      transition: transform 0.32s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 10;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
    }
    #drawer.open { transform: translateX(0); }

    #drawer-toggle {
      position: absolute;
      left: 100%;
      top: 1rem;
      width: 26px;
      height: 40px;
      background: rgba(10, 12, 18, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      border-left: none;
      border-radius: 0 6px 6px 0;
      color: #9cf;
      font-size: 18px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 4px 0 12px rgba(0, 0, 0, 0.3);
    }
    #drawer-toggle:hover { color: #fff; }
    #drawer-toggle:focus { outline: none; }
    #drawer.open #drawer-toggle::before { content: '‹'; }
    #drawer:not(.open) #drawer-toggle::before { content: '›'; }

    #drawer-content {
      padding: 1.25rem 1.4rem;
      overflow-y: auto;
      height: 100%;
      box-sizing: border-box;
    }
    #drawer-content h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin: 0 0 1rem;
      color: #fff;
    }
    #drawer-content h1 small {
      font-weight: 400;
      color: #888;
      margin-left: 0.4em;
      font-size: 11px;
    }
    #drawer-content h2 {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin: 1.4rem 0 0.5rem;
      color: #888;
    }

    .row {
      display: grid;
      grid-template-columns: 5.5rem 5.2rem 1fr;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .row:last-child { border-bottom: none; }
    .row .label { color: #888; }
    .row .val {
      color: #fff;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .row .val.accent { color: #9cf; }
    .row .keys {
      justify-self: center;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }
    .row .key-hint {
      font-size: 10px;
      color: #5b5b5b;
      letter-spacing: 0.05em;
      line-height: 1;
      white-space: nowrap;
    }
    .row.wide { grid-template-columns: 1fr auto; }

    .legend {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.45rem 0.85rem;
      align-items: center;
    }

    .preset-pills {
      display: flex;
      justify-content: flex-end;
      gap: 0.18rem;
      padding: 0.15rem 0 0.3rem;
    }
    .preset-pills .pill {
      font-family: inherit;
      font-size: 10.5px;
      background: rgba(255, 255, 255, 0.05);
      color: #555;
      padding: 0.12rem 0.34rem;
      border-radius: 3px;
      min-width: 0.5rem;
      text-align: center;
    }
    .preset-pills .pill.active {
      background: rgba(156, 204, 255, 0.22);
      color: #9cf;
    }
    .preset-pills .pill.target {
      background: rgba(156, 204, 255, 0.45);
      color: #fff;
    }
    .kbd {
      font-family: inherit;
      background: rgba(255, 255, 255, 0.07);
      padding: 0.35rem 0.6rem;
      border-radius: 3px;
      font-size: 12px;
      color: #ccc;
      text-align: center;
      white-space: nowrap;
      line-height: 1;
    }
    .kbd-desc {
      color: #aaa;
      font-size: 11px;
    }

    /* Buttons used as tap-targets share kbd visuals + standard reset. */
    button.kbd, .kbd-pair .kbd-btn, .preset-pills .pill {
      border: none;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    button.kbd:focus, .kbd-pair .kbd-btn:focus, .preset-pills .pill:focus {
      outline: none;
    }
    button.kbd:hover, .kbd-pair .kbd-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }
    button.kbd:active, .kbd-pair .kbd-btn:active, .preset-pills .pill:active {
      background: rgba(156, 204, 255, 0.32);
      color: #9cf;
    }

    .kbd-pair {
      display: inline-flex;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 3px;
      overflow: hidden;
    }
    .kbd-pair .kbd-btn {
      background: none;
      color: #ccc;
      font-size: 13px;
      padding: 0.4rem 0.5rem;
      line-height: 1;
      min-width: 1.2rem;
    }
    .kbd-pair .kbd-btn + .kbd-btn {
      border-left: 1px solid rgba(0, 0, 0, 0.35);
    }

    .preset-pills .pill {
      padding: 0.28rem 0.42rem;
      font-size: 11.5px;
      min-width: 1rem;
    }
  </style>
</head>
<body>
  <div id="drawer">
    <button id="drawer-toggle" tabindex="-1" aria-label="Toggle controls"></button>
    <div id="drawer-content">
      <h1>Petri Dish <small>Physarum</small></h1>

      <h2>state</h2>
      <div class="row"><span class="label">rotAngle</span><div class="keys"><span class="kbd-pair"><button class="kbd-btn" data-action="adjust" data-param="rotAngle" data-dir="-1">−</button><button class="kbd-btn" data-action="adjust" data-param="rotAngle" data-dir="1">+</button></span><span class="key-hint">← →</span></div><span id="v-rotAngle" class="val"></span></div>
      <div class="row"><span class="label">sensorAngle</span><div class="keys"><span class="kbd-pair"><button class="kbd-btn" data-action="adjust" data-param="sensorAngle" data-dir="-1">−</button><button class="kbd-btn" data-action="adjust" data-param="sensorAngle" data-dir="1">+</button></span><span class="key-hint">↓ ↑</span></div><span id="v-sensorAngle" class="val"></span></div>
      <div class="row"><span class="label">sensorDist</span><div class="keys"><span class="kbd-pair"><button class="kbd-btn" data-action="adjust" data-param="sensorDist" data-dir="-1">−</button><button class="kbd-btn" data-action="adjust" data-param="sensorDist" data-dir="1">+</button></span><span class="key-hint">[ ]</span></div><span id="v-sensorDist" class="val"></span></div>
      <div class="row"><span class="label">moldSpeed</span><div class="keys"><span class="kbd-pair"><button class="kbd-btn" data-action="adjust" data-param="moldSpeed" data-dir="-1">−</button><button class="kbd-btn" data-action="adjust" data-param="moldSpeed" data-dir="1">+</button></span><span class="key-hint">- =</span></div><span id="v-moldSpeed" class="val"></span></div>
      <div class="row"><span class="label">bgFade</span><div class="keys"><span class="kbd-pair"><button class="kbd-btn" data-action="adjust" data-param="bgFade" data-dir="-1">−</button><button class="kbd-btn" data-action="adjust" data-param="bgFade" data-dir="1">+</button></span><span class="key-hint">, .</span></div><span id="v-bgFade" class="val"></span></div>

      <h2>mode</h2>
      <div class="row wide"><span class="label">mode</span><span id="v-mode" class="val accent"></span></div>
      <div class="row wide"><span class="label">preset</span><span id="v-preset" class="val accent"></span></div>
      <div id="v-preset-pills" class="preset-pills"></div>

      <h2>actions</h2>
      <div class="legend">
        <button class="kbd kbd-action" data-action="drift" title="D">D</button><div class="kbd-desc">drift (perlin)</div>
        <button class="kbd kbd-action" data-action="lerp" title="L">L</button><div class="kbd-desc">lerp (preset cycle)</div>
        <button class="kbd kbd-action" data-action="reset" title="R">R</button><div class="kbd-desc">reset molds</div>
        <button class="kbd kbd-action" data-action="hide" title="H">H</button><div class="kbd-desc">hide / show panel</div>
      </div>
    </div>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
